name: Deploy WhatsApp Assistant

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /opt/whatsapp-assistant
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: /opt/whatsapp-assistant

      - name: Deploy with Docker Compose
        run: |
          # Build new image with Run Number tag
          TAG=${{ github.run_number }}
          docker build -t whatsapp-assistant:$TAG .
          
          # Fast Swap: Stop the old one and start the new one immediately
          # This minimizes downtime to just a few seconds
          TAG=$TAG docker-compose up -d
          
      - name: Cleanup old tags
        run: |
          # Only remove previous tags of THIS projeJuid6hipS4rY2Zjct to avoid touching other images on your server
          TAG=${{ github.run_number }}
          docker images --format "{{.Repository}}:{{.Tag}}" | grep "whatsapp-assistant" | grep -v "$TAG" | xargs -r docker rmi || true

