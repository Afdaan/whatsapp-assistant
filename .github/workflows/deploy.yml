name: Deploy WhatsApp Assistant

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Path where the app is deployed on the server
          path: /opt/whatsapp-assistant

      - name: Deploy with Docker Compose
        run: |
          cd /opt/whatsapp-assistant
          
          echo "::group::Building Docker Image"
          # Use run_number for easy reading, but could also use sha for traceability
          TAG=${{ github.run_number }}
          # Using --quiet to prevent leaking build details in public logs
          docker build --quiet -t whatsapp-assistant:$TAG .
          docker tag whatsapp-assistant:$TAG whatsapp-assistant:latest
          echo "::endgroup::"
          
          echo "::group::Updating Service"
          # Deploying with the new tag. --remove-orphans ensures a clean state.
          TAG=$TAG docker-compose up -d --remove-orphans
          echo "::endgroup::"
          
      - name: Cleanup old images
        run: |
          echo "::group::Image Cleanup"
          CURRENT_TAG=${{ github.run_number }}
          # Anchored grep to only target this project's images.
          # We keep 'latest' and the current run number tag.
          docker images --format "{{.Repository}}:{{.Tag}}" | \
            grep "^whatsapp-assistant:" | \
            grep -v -E ":($CURRENT_TAG|latest)$" | \
            xargs -r docker rmi 2>/dev/null || true
          echo "::endgroup::"

